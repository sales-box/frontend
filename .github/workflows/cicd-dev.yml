name: Frontend CI/CD (Dev)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          npm run lint -w apps/dashboard
          npm run lint -w apps/extension

      - name: Build
        run: |
          npm run build -w apps/dashboard
          npm run build -w apps/extension

      - name: Run Trivy vulnerability scanner (FS scan)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-build-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: ${{ github.event_name == 'push' }}
          tags: |
            mnagy156/salesbox-frontend-dev:latest
            mnagy156/salesbox-frontend-dev:${{ github.sha }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_DEV_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app
            docker compose down --remove-orphans
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -af
